services:
  backend:
    build:
      context: ./backend
    container_name: openbutler-backend
    environment:
      OPENBUTLER_DATA_DIR: /app/data
    ports:
      - "${OPENBUTLER_BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: openbutler-frontend
    environment:
      VITE_API_BASE_URL: "http://localhost:${OPENBUTLER_BACKEND_PORT:-8000}"
    ports:
      - "${OPENBUTLER_FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
