name: OpenButler CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  butler-core:
    name: Butler Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r backend/requirements.txt
      - run: python -m unittest discover -s backend/app/modules/butler_core/tests
        env:
          PYTHONPATH: backend

  pc-activity:
    name: PC Activity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r backend/requirements.txt
      - run: python -m unittest discover -s backend/app/modules/pc_activity_context/tests
        env:
          PYTHONPATH: backend

  workstation-vision:
    name: Workstation Vision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r backend/requirements.txt
      - run: python -m unittest discover -s backend/app/modules/workstation_vision/tests
        env:
          PYTHONPATH: backend

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  desktop-contract:
    name: Desktop Contract
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run build:frontend
        working-directory: desktop
      - run: node desktop/scripts/check-desktop-contract.mjs
      - run: node desktop/scripts/check-desktop-frontend-assets.mjs

  loop-governance:
    name: Loop Governance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/loop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/loop/package-lock.json
      - run: npm ci --registry=https://registry.npmjs.org
      - run: npm test
      - run: npm run audit:governance -- --no-write
