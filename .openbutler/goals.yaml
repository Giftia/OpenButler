product_goal:
  name: "OpenButler 主动全场景感知 AI 管家"
  mission: "让用户的生活更加清晰高效可量化"
  current_stage: "Product Experience V3"
  north_star: "用户每天 60 秒内理解今天发生了什么、什么值得注意、下一步应该做什么"

active_objectives:
  - id: OB-GOAL-001
    title: "完成主动管家中枢 MVP"
    priority: P0
    status: implemented
    success_criteria:
      - "/butler 页面可用"
      - "今日指标可生成"
      - "主动洞察可生成"
      - "用户反馈可记录"
      - "strict 模式不调用外部模型"

  - id: OB-GOAL-002
    title: "把 MineContext PC 活动转化为统一时间线"
    priority: P0
    status: implemented
    success_criteria:
      - "PCActivityEvent 可转换为 UnifiedTimelineEvent"
      - "支持 timeline rebuild"
      - "保留证据边界"

  - id: OB-GOAL-003
    title: "建立可持续产品化开发流程"
    priority: P0
    status: implemented
    success_criteria:
      - "AGENTS.md 存在"
      - "ROADMAP 存在"
      - "Definition of Done 存在"
      - "测试文档存在"
      - "隐私边界文档存在"

  - id: OB-GOAL-004
    title: "Proactive Butler Core L2：真实历史、证据复核与反馈降噪"
    priority: P0
    status: partially_verified
    description: >
      将主动管家从 MVP 功能推进到可持续使用阶段。
      本阶段聚焦真实 7 天历史导入、洞察证据详情可复核、
      用户反馈驱动的 insight 降噪评估。
    success_criteria:
      - "支持 MineContext / PC Activity 最近 7 天历史导入的 dry-run 预览"
      - "支持幂等导入，重复执行不会制造重复事件"
      - "支持导入后生成 7 天指标摘要"
      - "Butler Inbox 中每条 insight 可以打开证据详情"
      - "证据详情 smoke 测试可验证点击链路"
      - "用户 feedback 可影响 insight 评分或优先级"
      - "存在 insight 降噪评估报告或测试"
      - "strict 模式下不调用外部模型"
      - "默认不复制 MineContext 截图"
      - "不删除 MineContext 原始数据"

  - id: OB-GOAL-006
    title: "Product-friendly UI V1：降低理解成本，建立渐进式主动管家体验"
    priority: P0
    status: active
    description: >
      将 OpenButler 从技术控制台优化为用户友好的主动 AI 管家首页。
      重点是第一屏价值表达、渐进式功能触发、统一时间线展示、
      证据可复核和新用户引导。
    success_criteria:
      - "用户打开首页后 10 秒内能理解 OpenButler 的核心价值"
      - "首页不再堆叠大量技术模块"
      - "普通用户不需要理解 MineContext、PCActivity、UnifiedTimelineEvent 等术语"
      - "提供渐进式上手流程"
      - "今日概览、主动提醒、时间线、证据入口清晰可见"
      - "保留高级入口给开发者和 power user"
      - "前端 build 通过"
      - "不破坏现有后端测试"

  - id: OB-GOAL-008
    title: "Mobile UX Polish V2：减少技术泄露，压缩首屏，强化演示闭环"
    priority: P0
    status: active
    description: >
      基于移动端线上 Demo 截图反馈，继续优化 OpenButler 普通用户体验。
      本阶段聚焦移动端首屏压缩、演示内容去技术化、时间线中文生活化、
      管家回答去内部字段、我的页分层和按钮可用性。
    success_criteria:
      - "移动端首屏不再被大导航占据"
      - "首页第一屏能展示产品价值、今日摘要和一个主行动"
      - "普通用户界面不出现英文 demo 文案"
      - "普通用户界面不出现 phone_album、seed、Provider、Webhook 等内部字段"
      - "时间线演示事件像生活记录，而不是开发日志"
      - "管家演示回答不泄露内部数据源字段"
      - "我的页第一层面向普通用户，高级架构内容进入高级与实验室"
      - "所有按钮可点击状态清晰"
      - "frontend build 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-009
    title: "Timeline V2：米家式事件流与三维筛选"
    priority: P0
    status: active
    description: >
      将 OpenButler 时间线优化为普通用户更容易浏览的事件流。
      单条事件弱化时间和来源，突出事件内容，并支持右侧图片证据。
      顶部提供时间、来源、事件三个筛选维度。
    success_criteria:
      - "时间线事件标题和摘要成为视觉重点"
      - "时间、来源、置信度等辅助信息被淡化"
      - "事件卡片支持右侧缩略图"
      - "有图片证据时显示图片，无图片时显示来源占位"
      - "支持时间、来源、事件三类筛选"
      - "筛选空状态友好"
      - "普通 UI 不暴露内部字段名"
      - "frontend build 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-010
    title: "Product Experience V3：生活任务优先的私人管家体验"
    priority: P0
    status: active
    description: >
      基于桌面端和移动端中立用户评审，把主路径从技术验证台调整为
      生活任务优先的私人管家体验。重点是生活化 demo、结果型首页、
      管家主动摘要、我的授权和普通语言证据说明。
    success_criteria:
      - "首页首屏表达已经帮你整理好的生活事项"
      - "主路径 demo 不再以开发者工作流为核心"
      - "移动端默认主导航弱化时间线和高级入口"
      - "时间线筛选使用生活分类和重要性"
      - "管家页提供主动摘要和下一步行动"
      - "我的页第一层是授权、读取范围和提醒偏好"
      - "普通路径不暴露技术控制台术语"
      - "frontend build 通过"
      - "后端核心测试通过"

governance_objectives:
  - id: OB-GOAL-005
    title: "Architecture Reality Alignment and Repository Baseline"
    priority: P0
    status: active
    description: "建立 Git 基线，并把文档、任务队列、路径约定、插件运行时说明与当前真实仓库对齐。"
    success_criteria:
      - "git init completed"
      - "baseline commit exists"
      - "architecture docs reflect backend/frontend/api layout"
      - "runtime plugin source is documented as backend/app/plugins/*.json"
      - "insight evidence contract documents inline evidence_refs"
      - "task queue has ready next tasks"
    note: >
      OB-GOAL-005 is intentionally not listed under active_objectives because the
      current Productization Harness evidence mapper only supports OB-GOAL-001
      through OB-GOAL-004. See OB-TASK-057 before adding new active objective
      mappers.

constraints:
  - "不接入新硬件"
  - "不自动部署"
  - "不自动合并"
  - "不删除 MineContext 原始数据"
  - "strict 模式下禁止外部模型"
  - "不重写 MineContext / godview"
  - "不自动上传截图或原始 PC 活动"
  - "不自动写入外部系统"
  - "不做心理、医学、人格判断"
