product_goal:
  name: "OpenButler 主动全场景感知 AI 管家"
  mission: "让用户的生活更加清晰高效可量化"
  current_stage: "Demo / Local Mode Boundary"
  north_star: "用户每天 60 秒内理解今天发生了什么、什么值得注意、下一步应该做什么"

active_objectives:
  - id: OB-GOAL-016
    title: "Demo / Local Mode Boundary"
    priority: P0
    status: active
    description: >
      将 Vercel 线上版明确定位为公开样例体验，将真实个人数据能力收束到本地模式。
      普通用户路径需要清楚说明：线上样例不会读取真实数据；本地模式需要用户本机运行并主动授权。
    success_criteria:
      - "线上 Demo 明确标识为样例体验"
      - "公开 Demo 不暗示已经连接真实本机数据"
      - "真实本地模式入口说明需要本机运行和主动授权"
      - "普通路径 CTA 使用看今天重点、查看时间线、解释依据、了解本地模式等用户任务文案"
      - "普通路径不出现 mock、seed、debug、internal source 等工程词"
      - "提醒、时间线和问管家都保留依据与边界说明"
      - "不新增 /api/butler/insights/{id}/evidence"
      - "不读取真实 MineContext 数据"
      - "不复制截图或上传数据"
      - "前端 build 和后端核心测试通过"

archived_objectives:
  - id: OB-GOAL-001
    title: "完成主动管家中枢 MVP"
    priority: P0
    status: implemented
    success_criteria:
      - "/butler 页面可用"
      - "今日指标可生成"
      - "主动洞察可生成"
      - "用户反馈可记录"
      - "strict 模式不调用外部模型"

  - id: OB-GOAL-002
    title: "把 MineContext PC 活动转化为统一时间线"
    priority: P0
    status: implemented
    success_criteria:
      - "PCActivityEvent 可转换为 UnifiedTimelineEvent"
      - "支持 timeline rebuild"
      - "保留证据边界"

  - id: OB-GOAL-003
    title: "建立可持续产品化开发流程"
    priority: P0
    status: implemented
    success_criteria:
      - "AGENTS.md 存在"
      - "ROADMAP 存在"
      - "Definition of Done 存在"
      - "测试文档存在"
      - "隐私边界文档存在"

  - id: OB-GOAL-004
    title: "Proactive Butler Core L2：真实历史、证据复核与反馈降噪"
    priority: P0
    status: partially_verified
    description: >
      将主动管家从 MVP 功能推进到可持续使用阶段。
      本阶段聚焦真实 7 天历史导入、洞察证据详情可复核、
      用户反馈驱动的 insight 降噪评估。
    success_criteria:
      - "支持 MineContext / PC Activity 最近 7 天历史导入的 dry-run 预览"
      - "支持幂等导入，重复执行不会制造重复事件"
      - "支持导入后生成 7 天指标摘要"
      - "Butler Inbox 中每条 insight 可以打开证据详情"
      - "证据详情 smoke 测试可验证点击链路"
      - "用户 feedback 可影响 insight 评分或优先级"
      - "存在 insight 降噪评估报告或测试"
      - "strict 模式下不调用外部模型"
      - "默认不复制 MineContext 截图"
      - "不删除 MineContext 原始数据"

  - id: OB-GOAL-006
    title: "Product-friendly UI V1：降低理解成本，建立渐进式主动管家体验"
    priority: P0
    status: implemented
    description: >
      将 OpenButler 从技术控制台优化为用户友好的主动 AI 管家首页。
      重点是第一屏价值表达、渐进式功能触发、统一时间线展示、
      证据可复核和新用户引导。
    success_criteria:
      - "用户打开首页后 10 秒内能理解 OpenButler 的核心价值"
      - "首页不再堆叠大量技术模块"
      - "普通用户不需要理解 MineContext、PCActivity、UnifiedTimelineEvent 等术语"
      - "提供渐进式上手流程"
      - "今日概览、主动提醒、时间线、证据入口清晰可见"
      - "保留高级入口给开发者和 power user"
      - "前端 build 通过"
      - "不破坏现有后端测试"

  - id: OB-GOAL-008
    title: "Mobile UX Polish V2：减少技术泄露，压缩首屏，强化演示闭环"
    priority: P0
    status: implemented
    description: >
      基于移动端线上 Demo 截图反馈，继续优化 OpenButler 普通用户体验。
      本阶段聚焦移动端首屏压缩、演示内容去技术化、时间线中文生活化、
      管家回答去内部字段、我的页分层和按钮可用性。
    success_criteria:
      - "移动端首屏不再被大导航占据"
      - "首页第一屏能展示产品价值、今日摘要和一个主行动"
      - "普通用户界面不出现英文 demo 文案"
      - "普通用户界面不出现 phone_album、seed、Provider、Webhook 等内部字段"
      - "时间线演示事件像生活记录，而不是开发日志"
      - "管家演示回答不泄露内部数据源字段"
      - "我的页第一层面向普通用户，高级架构内容进入高级与实验室"
      - "所有按钮可点击状态清晰"
      - "frontend build 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-009
    title: "Timeline V2：米家式事件流与三维筛选"
    priority: P0
    status: implemented
    description: >
      将 OpenButler 时间线优化为普通用户更容易浏览的事件流。
      单条事件弱化时间和来源，突出事件内容，并支持右侧图片证据。
      顶部提供时间、来源、事件三个筛选维度。
    success_criteria:
      - "时间线事件标题和摘要成为视觉重点"
      - "时间、来源、置信度等辅助信息被淡化"
      - "事件卡片支持右侧缩略图"
      - "有图片证据时显示图片，无图片时显示来源占位"
      - "支持时间、来源、事件三类筛选"
      - "筛选空状态友好"
      - "普通 UI 不暴露内部字段名"
      - "frontend build 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-010
    title: "Product Experience V3：生活任务优先的私人管家体验"
    priority: P0
    status: implemented
    description: >
      基于桌面端和移动端中立用户评审，把主路径从技术验证台调整为
      生活任务优先的私人管家体验。重点是生活化 demo、结果型首页、
      管家主动摘要、我的授权和普通语言证据说明。
    success_criteria:
      - "首页首屏表达已经帮你整理好的生活事项"
      - "主路径 demo 不再以开发者工作流为核心"
      - "移动端默认主导航弱化时间线和高级入口"
      - "时间线筛选使用生活分类和重要性"
      - "管家页提供主动摘要和下一步行动"
      - "我的页第一层是授权、读取范围和提醒偏好"
      - "普通路径不暴露技术控制台术语"
      - "frontend build 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-011
    title: "First-Run Activation Flow"
    priority: P0
    status: implemented
    description: >
      将首次进入体验从产品说明升级为激活流。新用户需要在 30 秒内理解
      OpenButler 的用途、样例体验与真实本地模式的区别，以及连接后会得到
      今日概览、时间线、管家提醒和可复核依据。
    success_criteria:
      - "新用户 30 秒内理解 OpenButler 是私人 AI 管家"
      - "首次进入可以选择先看样例、连接本地数据源或稍后配置"
      - "样例体验明确说明不会读取真实数据"
      - "真实本地模式明确说明需要用户主动授权"
      - "未授权时不会出现空控制台"
      - "用户能明确知道连接后会得到什么"
      - "/me 可以重新打开激活引导"
      - "frontend build 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-012
    title: "Today as Command Center"
    priority: P0
    status: implemented
    description: >
      将 /butler 首页收敛成今日中控。第一屏优先展示今天的状态、
      最高优先级建议、少量关键数字和下一步行动，而不是模块列表或技术能力清单。
    success_criteria:
      - "移动端打开 /butler，第一屏完整看到价值、状态、主行动"
      - "首页不再像模块入口页，也不展示技术能力列表"
      - "今日摘要主卡只讲用户关心的结果"
      - "最高优先级建议在首屏或首屏下沿可见"
      - "隐私状态轻提示存在，但不抢主视觉"
      - "普通 UI 不出现内部字段和开发者术语"
      - "首次激活流仍可用"
      - "前端 build 和 today smoke 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-013
    title: "Timeline as Life Event Feed"
    priority: P0
    status: implemented
    description: >
      将 /timeline 打磨为可筛选、可扫读、可复核的生活事件流。
      时间和来源作为辅助信息，事件标题、摘要和右侧证据占位成为主要浏览对象。
    success_criteria:
      - "时间线支持时间、分类、重要性筛选"
      - "事件标题和摘要是视觉重点"
      - "事件卡片支持右侧缩略图或证据占位"
      - "不展示本地截图路径"
      - "每条事件可解释来源和边界"
      - "事件显示待处理、可复核或已记录状态"
      - "筛选无结果时有友好空状态"
      - "普通 UI 不出现内部字段和开发者术语"
      - "前端 build 和 timeline smoke 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-014
    title: "Butler Inbox as Decision Queue"
    priority: P0
    status: implemented
    description: >
      将 /butler/inbox 从提醒列表改成用户决策队列。用户可以把提醒处理掉、
      放到稍后、标记不准确，反馈会影响后续同类提醒的优先级。
    success_criteria:
      - "Inbox 显示待确认、稍后、已处理、不准确四类状态"
      - "用户能处理一条提醒并看到状态变化"
      - "稍后和不准确反馈会立即移动卡片"
      - "少提醒类似内容会显示降噪提示"
      - "同类提醒反馈会影响后续优先级"
      - "data_quality_notice 和 privacy_notice 不会被永久静默"
      - "依据展开不显示内部字段或本地路径"
      - "前端 build 和 inbox smoke 通过"
      - "后端核心测试通过"

  - id: OB-GOAL-015
    title: "Assistant as Natural Control Layer"
    priority: P0
    status: implemented
    description: >
      将 /assistant 打磨成自然语言入口。用户可以回看今天、确认下一步、
      解释依据、提交提醒反馈、生成复盘和查时间线；回答必须保留关键数字、
      依据、边界说明和下一步。
    success_criteria:
      - "问管家支持今日回看、下一步建议、解释依据、修改偏好、生成复盘、查时间线"
      - "回答包含关键数字、依据、边界说明和下一步"
      - "数据不足时明确说明，不凭聊天记忆编造"
      - "不能确认远程仓库、部署、接口或任务系统实时状态"
      - "普通回答不出现 mock、seed、phone_album、source_event_id 等内部字段"
      - "移动端问管家入口不横向溢出"
      - "前端 build 和 assistant smoke 通过"
      - "后端核心测试通过"

planned_objectives:
  - id: OB-GOAL-021
    title: "Achievement Layer Recovery"
    priority: P0
    status: implemented
    description: "恢复成就系统为独立普通用户入口，并将旧奖状栏升级为正反馈层。"
    success_criteria:
      - "/achievements 前端路由存在"
      - "主导航显示 成就"
      - "今日页可进入今天的小成就"
      - "成就页展示今天的小成就、连续记录、下一枚可解锁"
      - "成就卡可展开依据和边界说明"
      - "普通 UI 不暴露内部字段或本地截图路径"

  - id: OB-GOAL-017
    title: "Goal Queue Governance"
    priority: P0
    status: planned
    description: "清理目标队列、更新 current_state.md，并保持一次只推进一个 active productization goal。"

  - id: OB-GOAL-018
    title: "Local Real Mode Activation Path"
    priority: P0
    status: planned
    description: "为本地真实模式设计清楚的启动、授权、预览和关闭路径。"

  - id: OB-GOAL-019
    title: "Evidence Trust Layer V1"
    priority: P0
    status: planned
    description: "统一首页、时间线、提醒收件箱和问管家的依据表达。"

  - id: OB-GOAL-020
    title: "Real 7-Day Local Review"
    priority: P0
    status: needs-human
    description: "在用户明确授权后，执行真实 7 天本地回顾闭环；默认从 dry-run 开始。"

governance_objectives:
  - id: OB-GOAL-005
    title: "Architecture Reality Alignment and Repository Baseline"
    priority: P0
    status: active
    description: "建立 Git 基线，并把文档、任务队列、路径约定、插件运行时说明与当前真实仓库对齐。"
    success_criteria:
      - "git init completed"
      - "baseline commit exists"
      - "architecture docs reflect backend/frontend/api layout"
      - "runtime plugin source is documented as backend/app/plugins/*.json"
      - "insight evidence contract documents inline evidence_refs"
      - "task queue has ready next tasks"
    note: >
      OB-GOAL-005 is intentionally not listed under active_objectives because the
      current Productization Harness evidence mapper only supports OB-GOAL-001
      through OB-GOAL-004. See OB-TASK-057 before adding new active objective
      mappers.

constraints:
  - "不接入新硬件"
  - "不自动部署"
  - "不自动合并"
  - "不删除 MineContext 原始数据"
  - "strict 模式下禁止外部模型"
  - "不重写 MineContext / godview"
  - "不自动上传截图或原始 PC 活动"
  - "不自动写入外部系统"
  - "不做心理、医学、人格判断"
