constraints:
  - "Windows 是首个可运行平台，macOS 只保持构建契约"
  - "NanoKVM-Go+ 不阻塞核心 Beta，真机到货前仅做契约与 mock"
  - "不删除或修改 MineContext 原始数据"
  - "不读取真实 MineContext 活动，除非另有明确授权"
  - "默认不复制截图，不持久化原始音视频"
  - "strict 模式禁止外部模型和外部 Webhook"
  - "身份不确定时必须回退为 unknown"
  - "高风险动作不得自动执行或自动合并"
