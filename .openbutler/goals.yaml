product_goal:
  name: "OpenButler 主动全场景感知 AI 管家"
  mission: "让用户的生活更加清晰、高效、可量化"
  current_stage: "Loop-Driven Ambient OpenButler"
  north_star: "在不越过授权边界的前提下，让用户获得真正有用、可解释且不过度打扰的主动帮助"

active_objectives:
  - id: OB-GOAL-027
    title: "Loop-Driven Ambient OpenButler"
    priority: P0
    status: active
    description: >
      用 loop-engineering 建立 OpenButler 的开发控制面，并定义持续感知运行闭环。
      本阶段只启用 L1 只读治理巡检，不自动修改产品代码、不自动合并，
      后续按验证证据逐级开放 L2 和 L3。
    success_criteria:
      - "远端旧 main 已归档，当前产品历史成为受保护的 canonical main"
      - "LOOP.md、STATE.md、loop-budget.md、loop-constraints.md、loop-run-log.md 存在且相互一致"
      - "L1 治理巡检仅写入忽略目录中的报告，不修改产品代码或 GitHub 状态"
      - "基础 CI 覆盖 Butler Core、PC Activity、Workstation Vision、Frontend 和 Desktop contract"
      - "GitHub Issues 成为可执行工作队列，仓库内 task queue 只保存目标级状态"
      - "Ambient 产品路线固定为 OB-GOAL-028 到 OB-GOAL-033，并保持安全前置顺序"
      - "未读取真实 MineContext 活动、未复制截图、未调用外部模型"
      - "首次人工 L1 已在 canonical main 上完成并被人工接受"

planned_objectives:
  - id: OB-GOAL-028
    title: "Secure Local Control Plane & PrivacyGuard"
    priority: P0
    status: blocked
    blocked_by: [OB-GOAL-027]
    success_criteria:
      - "本地 API 有会话鉴权和 Origin 限制"
      - "统一 PrivacyGuard 覆盖外部模型、Webhook、截图和数据源写入"
      - "授权可撤回，且一个处理周期内生效"
      - "敏感操作进入审计日志"

  - id: OB-GOAL-029
    title: "Continuous Laptop Sensing Runtime"
    priority: P0
    status: blocked
    blocked_by: [OB-GOAL-028]
    success_criteria:
      - "Electron 调度支持检查点、崩溃恢复和重复事件保护"
      - "锁屏、睡眠、合盖和节能状态会调整或停止采样"
      - "摄像头和麦克风使用状态持续可见"
      - "默认不持久化原始音视频"

  - id: OB-GOAL-030
    title: "Household Identity & Consent"
    priority: P0
    status: blocked
    blocked_by: [OB-GOAL-029]
    success_criteria:
      - "支持户主、成人、儿童、访客和 unknown"
      - "自动识别只适用于明确注册的成员"
      - "低置信度统一回退为 unknown"
      - "多人在场时不会播报私人内容"

  - id: OB-GOAL-031
    title: "Silence & Intervention Policy"
    priority: P0
    status: blocked
    blocked_by: [OB-GOAL-030]
    success_criteria:
      - "安静时段真实生效"
      - "支持同类提醒冷却、每日介入预算和重复抑制"
      - "每次保持沉默或介入都有原因码"
      - "隐私和数据质量提醒不会被永久静默"

  - id: OB-GOAL-032
    title: "First Useful Ambient Loop"
    priority: P0
    status: blocked
    blocked_by: [OB-GOAL-031]
    success_criteria:
      - "合成的 90 分钟在场与 PC 上下文只生成一条有依据建议"
      - "建议默认进入 Inbox，屏幕优先，语音需显式开启"
      - "重启不重复生成，反馈会影响后续频率"
      - "strict 模式不调用外部模型"

  - id: OB-GOAL-033
    title: "Action Proposal & Smart Home"
    priority: P1
    status: blocked
    blocked_by: [OB-GOAL-032]
    success_criteria:
      - "动作采用 Proposal、Approved、Running、Succeeded 或 Failed 状态机"
      - "首批动作仅限可撤销白名单"
      - "锁门、购买、发消息和外部写入始终逐次确认"
      - "远程事实在执行前回源验证"

archived_objectives:
  - id: OB-GOAL-026
    title: "Local Mode Activation to First Useful Result"
    priority: P0
    status: implemented
    evidence:
      - "commit 79485f5 feat: gate local mode activation to first preview"
      - "frontend smoke:local-mode-activation"
      - "backend desktop status privacy tests"

constraints:
  - "Windows 笔记本是第一参考设备，暂不开发专用无屏硬件"
  - "不接入新硬件，不扩展新的真实数据源"
  - "不删除或修改 MineContext 原始数据"
  - "不读取真实 MineContext 活动，除非另有明确授权"
  - "默认不复制截图，不持久化原始音视频"
  - "strict 模式禁止外部模型和外部 Webhook"
  - "身份不确定时必须回退为 unknown"
  - "高风险动作不得自动执行或自动合并"
