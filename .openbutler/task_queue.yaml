      - "使用大卡片、场景分组、低认知负担布局"
      - "高级技术能力被折叠到高级入口"
      - "空状态和新用户状态可读"
    evidence:
      - "frontend/src/App.tsx renders /butler as a product-friendly Today page with hero, status cards, suggestions, timeline preview, and advanced lab."
      - "frontend/src/lib/butlerUiAdapter.ts maps backend home/timeline payloads into user-facing view models."
      - "frontend/src/styles.css adds responsive product home cards and mobile-first layout."

