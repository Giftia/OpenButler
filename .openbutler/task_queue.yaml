tasks:
  - id: OB-TASK-270
    title: "建立 canonical main 与公开仓库安全基线"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "完整历史敏感扫描无阻断项"
      - "旧 main 保存为 archive/original-main-2026-07-15"
      - "产品历史替换远端 main"
      - "仓库公开前未发现真实数据库、截图或密钥"
    evidence:
      - "remote archive/original-main-2026-07-15 points to 5e67d7e"
      - "remote main points to 79485f5 before OB-GOAL-027 changes"

  - id: OB-TASK-271
    title: "初始化并固定 loop-engineering Codex Daily Triage"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "官方 loop-init 1.4.0 scaffold 已运行"
      - "所有 loop CLI 使用 @cobusgreyling scope 固定版本"
      - "LOOP、STATE、budget、constraints、run log 已按 OpenButler 定制"
    evidence:
      - "@cobusgreyling/loop-init@1.4.0 Codex daily-triage scaffold"
      - "tools/loop/package-lock.json pins scoped loop CLIs"
      - "upstream loop-audit score 100/100; promotion remains locally gated at L0"

  - id: OB-TASK-272
    title: "实现只读 repo-governance-drift-audit"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "输出 Markdown 和 JSON 聚合报告"
      - "退出码 0/2/3 分别代表 clean/drift/partial"
      - "不修改产品代码、不读取真实 MineContext、不写 GitHub"
      - "有自动化测试覆盖"
    evidence:
      - "tools/loop/governance-audit.mjs"
      - "tools/loop/tests/governance-audit.test.mjs"
      - "offline audit outcome clean with zero product and GitHub mutations"

  - id: OB-TASK-273
    title: "建立基础 CI 与只读 Loop Audit workflow"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "五项产品检查和 Loop Governance 检查存在"
      - "loop workflow 权限只读"
      - "报告仅作为 Actions artifact 保存"
    evidence:
      - ".github/workflows/ci.yml"
      - ".github/workflows/loop-audit.yml"
      - "PR #16 six required checks passed"

  - id: OB-TASK-274
    title: "建立 GitHub Issue 队列与分支保护"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "五个治理标签存在"
      - "OB-GOAL-028 到 033 各有可执行 Issue"
      - "main 需要 PR 和必需 CI 检查"
      - "自动合并白名单和永不自动合并范围已记录"
    evidence:
      - "GitHub issues #9 through #15"
      - "needs-triage, needs-info, ready-for-agent, ready-for-human, wontfix labels"
      - "main requires pull requests and six strict checks; force-push and deletion disabled"

  - id: OB-TASK-275
    title: "运行首次 L1 治理巡检"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "手动巡检完成"
      - "报告不包含用户活动明细"
      - "无变化时提前退出"
      - "巡检未修改产品代码或 GitHub 状态"
    evidence:
      - "PR #16 merged as 5081011"
      - "canonical GitHub-connected L1 outcome clean"
      - "zero product mutations, GitHub mutations, MineContext reads, screenshot copies, external model calls, or webhook calls"

  - id: OB-TASK-276
    title: "启用本机夜间演练与 08:00 晨间验收"
    goal_id: OB-GOAL-027
    priority: P1
    status: done
    done_when:
      - "Windows Task Scheduler 已完成一次受监督 L1 dry-run"
      - "运行回读、预算和零变更边界均已验证"
      - "ChatGPT Web 仅提供公开事实审查，不作为本机触发器"
      - "一次监督 dry-run 有真实运行回读"
    evidence:
      - "Local Codex heartbeat is paused after producing no accepted runtime evidence"
      - "Windows Task Scheduler run 2026-07-23T15-15-37-644Z completed with LastTaskResult 0"
      - "ChatGPT Web reviewer is read-only and does not trigger local execution"

  - id: OB-TASK-277
    title: "记录 Ambient 路线、类型和安全门槛"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "开发 Loop 与产品 Ambient Loop 明确分离"
      - "OB-GOAL-028 到 033 顺序和依赖明确"
      - "传感器、身份、沉默和动作策略有可测试契约"
    evidence:
      - "docs/architecture/LOOP_DRIVEN_AMBIENT_ARCHITECTURE.md"
      - "docs/architecture/decisions/0011-loop-engineering-development-control-plane.md"
      - "docs/architecture/decisions/0012-windows-laptop-first-ambient-reference.md"

  - id: OB-TASK-278
    title: "对齐 Integrated Context Engine 加速路线"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "OB-GOAL-034 到 OB-GOAL-041 成为计划路线"
      - "OB-GOAL-028 到 OB-GOAL-033 标记为 deferred 或 superseded"
      - "L1 到 L2 门槛调整为一次监督 dry-run 和明确人工批准"
      - "本次治理修复不修改产品业务代码"

  - id: OB-LOOP-001
    title: "建立人工验收式夜间交付治理门禁"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "L1 到 L2 使用一次监督 dry-run 和明确人工批准"
      - "Nightly 仅自动发布隔离通道，稳定版保持人工批准"
      - "硬停止动作、高风险双 verifier 和 SHA 新鲜度有测试"

  - id: OB-LOOP-002
    title: "实现夜间队列、预算、运行锁和串行控制器"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "只选择 ready-for-agent 且无冲突租约的 Issue"
      - "L2 execute 只在 canonical main 生效"
      - "07:15 与 750k token 断路器生效"

  - id: OB-LOOP-003
    title: "实现 Codex maker 与独立 verifier 执行契约"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "一个 Issue 一个 worktree 与 PR"
      - "verifier 只返回 APPROVE、REJECT 或 ESCALATE_HUMAN"
      - "三次失败后停止并升级"

  - id: OB-LOOP-004
    title: "安装 Windows 夜间与晨间计划任务"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "20:00、07:15、08:20、08:30 四个任务可回读"
      - "重复安装不会产生重复任务"
      - "睡眠错过后可在恢复时运行"

  - id: OB-QA-001
    title: "建立 OpenButler Preview 并行打包通道"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "Preview 不覆盖稳定版"
      - "app id、安装目录和用户数据相互隔离"
      - "构建失败保留上一份可用 Preview"

  - id: OB-QA-002
    title: "实现桌面晨间验收中心和 acceptance pack"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "场景可标记通过、不通过或有条件通过"
      - "生成精确批准或修复命令"
      - "不保存真实活动、路径、Key 或 raw output"

  - id: OB-REPORT-001
    title: "生成脱敏本机晨报"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "区分 GitHub、CI、本机与未验证证据"
      - "列出阻塞和 2 到 3 个选择"

  - id: OB-RELEASE-001
    title: "实现批准后的 SHA 校验、合并和稳定版发布"
    goal_id: OB-GOAL-027
    priority: P0
    status: in_progress
    done_when:
      - "陈旧批准会被拒绝"
      - "只 squash merge 已批准 PR"
      - "main CI 通过后才 bump、发布和安装"

  - id: OB-DRYRUN-001
    title: "完成一次监督无修改演练"
    goal_id: OB-GOAL-027
    priority: P0
    status: done
    done_when:
      - "监督 dry-run 有真实调度回读和脱敏验收包"
      - "没有产品或 GitHub 修改"
      - "用户明确批准进入 L2"
    evidence:
      - "scheduled run 2026-07-23T15-15-37-644Z"
      - "LastTaskResult 0"
      - "zero product/GitHub mutation and zero personal-data read"
      - "user pre-authorization: 批准进入 L2，并启用完全自动代理"

  - id: OB-AUTO-001
    title: "建立 24x7 自动代理策略与四阶段 Windows 调度"
    goal_id: OB-GOAL-034
    priority: P0
    status: in_progress
    done_when:
      - "automation-policy.yaml 是统一运行策略"
      - "20:00、07:15、08:20、08:30 任务可回读"
      - "Cloud 未配置时自动降级到夜间本机执行"

  - id: OB-AUTO-002
    title: "实现跨 Cloud 与本机的单 Issue 执行租约"
    goal_id: OB-GOAL-034
    priority: P0
    status: in_progress
    done_when:
      - "cloud-running、nightly-running 和开放 PR 均阻止重复认领"
      - "过期租约可回收并留下证据"
      - "同一时间只运行一个 maker"

  - id: OB-AUTO-003
    title: "实现双 verifier 与自动合并门禁"
    goal_id: OB-GOAL-034
    priority: P0
    status: in_progress
    done_when:
      - "代码 verifier 和产品隐私 verifier 均通过"
      - "PR head SHA 与验收包一致"
      - "必需 CI 全绿且无 requested changes"
      - "高风险变更有 Nightly 隔离验证"
      - "硬停止动作进入 automation-blocked"

  - id: OB-AUTO-004
    title: "完成 Codex Cloud docs-only 连接 smoke"
    goal_id: OB-GOAL-034
    priority: P0
    status: blocked
    blocked_by: [OB-AUTO-001]
    done_when:
      - "OPENBUTLER_CODEX_CLOUD_ENV_ID 已配置"
      - "Cloud 在隔离分支完成 docs-only 变更"
      - "CI 与 PR 回读通过"
      - "smoke PR 合并后才启用白天 maker"

