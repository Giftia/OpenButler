tasks:
  - id: OB-TASK-050
    title: "Initialize Git repository and create baseline commit"
    goal_id: OB-GOAL-005
    priority: P0
    status: done
    done_when:
      - "git init completed"
      - ".gitignore exists"
      - "baseline commit created"
      - "no obvious secrets or runtime data committed"
    evidence:
      - "baseline commit b6fffb4 chore: establish OpenButler repository baseline"

  - id: OB-TASK-051
    title: "Align architecture docs with actual backend/frontend/api layout"
    goal_id: OB-GOAL-005
    priority: P0
    status: done
    done_when:
      - "CURRENT_ARCHITECTURE.md exists"
      - "REPO_STRUCTURE.md exists"
      - "AGENTS.md no longer points to apps/api or apps/web"
    files:
      - "docs/architecture/CURRENT_ARCHITECTURE.md"
      - "docs/architecture/REPO_STRUCTURE.md"
      - "AGENTS.md"

  - id: OB-TASK-052
    title: "Document actual plugin runtime source of truth"
    goal_id: OB-GOAL-005
    priority: P0
    status: done
    done_when:
      - "PLUGIN_RUNTIME.md exists"
      - "backend/app/plugins/*.json documented as current runtime source"
      - "top-level plugins/ documented as reserved"
    files:
      - "docs/architecture/PLUGIN_RUNTIME.md"
      - "plugins/README.md"
      - "docs/architecture/decisions/0007-plugin-runtime-source-of-truth.md"

  - id: OB-TASK-053
    title: "Align insight evidence contract with current implementation"
    goal_id: OB-GOAL-005
    priority: P0
    status: done
    done_when:
      - "API_CONTRACTS.md documents inline evidence_refs"
      - "ADR records evidence endpoint decision"
      - "OpenClaw docs do not claim a nonexistent endpoint"
    files:
      - "docs/architecture/API_CONTRACTS.md"
      - "docs/architecture/decisions/0008-insight-evidence-contract.md"
      - "docs/openclaw_integration.md"

  - id: OB-TASK-054
    title: "Run real MineContext 7-day dry-run preview with user confirmation"
    goal_id: OB-GOAL-004
    priority: P0
    status: done
    why: "Reads real local user activity metadata and should not run without explicit confirmation."
    done_when:
      - "dry-run only"
      - "no database write"
      - "no screenshot copy"
      - "event count and duplicate count reported"
      - "privacy boundary verified"
    evidence:
      - "User explicitly authorized read-only real MineContext 7-day dry-run on 2026-05-30."
      - "Entrypoint: ButlerCoreService.preview_pc_activity_import with dry_run=true, copy_screenshots=false, limit=5000."
      - "Aggregate result only: source_events=157, estimated_new_events=95, estimated_duplicate_events=62."
      - "OpenButler DB counts unchanged; MineContext source DB file metadata unchanged."
      - "external_model_used=false; external_webhook_used=false; screenshots_copied=false; minecontext_source_mutated=false."
    risks:
      - "Future reruns may expose local activity metadata in command output; keep output aggregated and redacted."

  - id: OB-TASK-055
    title: "Run Butler Inbox evidence detail browser smoke"
    goal_id: OB-GOAL-004
    priority: P0
    status: done
    done_when:
      - "frontend starts"
      - "Inbox page opens"
      - "an insight card can expand evidence_refs"
      - "evidence boundary is visible"
      - "smoke result documented"
    evidence:
      - "Ran npm run build successfully before browser smoke."
      - "Ran npm run smoke:butler-browser against temporary backend data dir on http://127.0.0.1:8011."
      - "Smoke result: inbox_evidence_click=true and evidence_boundary=true."
      - "Privacy counters: external_model_used=false, minecontext_source_deleted=0, copied_screenshots=0."
      - "Backend used synthetic demo data and nonexistent MineContext paths for this smoke; no real MineContext activity was read."
    risks:
      - "Requires local browser/runtime state"

  - id: OB-TASK-056
    title: "Audit and fix Chinese mojibake risk"
    goal_id: OB-GOAL-005
    priority: P1
    status: done
    done_when:
      - "files with mojibake risk identified"
      - "encoding source determined"
      - "frontend visual text verified"
      - "no accidental destructive encoding conversion"
    evidence:
      - "docs/dev/CHINESE_MOJIBAKE_AUDIT_2026-05-30.md records the audit."
      - "Mojibake pattern scan found no matching repository text files in scoped source/docs/config files."
      - "npm run build, npm run test:butler-browser-smoke-script, npm run test:inbox-evidence-panel, and npm run smoke:butler-browser all passed."
      - "Browser smoke verified key Chinese UI text and Butler Inbox evidence detail rendering."
      - "No bulk encoding conversion was performed."
    risks:
      - "Future PowerShell output can still render mojibake if text IO omits explicit UTF-8 encoding."

  - id: OB-TASK-057
    title: "Design unified PrivacyGuard without changing behavior"
    goal_id: OB-GOAL-005
    priority: P1
    status: done
    done_when:
      - "current distributed privacy checks are mapped"
      - "central guard interface is proposed"
      - "migration risks are documented"
      - "no business behavior is changed"
    evidence:
      - "docs/architecture/PRIVACY_GUARD_DESIGN.md maps current distributed privacy checks and proposes a future guard interface."
      - "docs/architecture/decisions/0009-design-privacyguard-before-implementation.md records the design-before-implementation decision."
      - "No backend behavior or API code was changed."
      - "Existing pc_activity_context, butler_core, and workstation_vision tests passed after the design update."
    risks:
      - "Premature implementation could break tested strict-mode paths; future wiring must be incremental."

  - id: OB-TASK-060
    title: "审计当前前端信息架构和用户路径"
    goal_id: OB-GOAL-006
